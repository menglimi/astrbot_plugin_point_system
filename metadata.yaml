name: astrbot_plugin_point_system
display_name: 群积分助手
author: menglimi
description: astrbot_plugin_point_system 是一个面向 AstrBot 群聊场景的积分互动插件，围绕“签到、活跃、抽奖、兑换、管理”这几类高频玩法设计。它支持按群维护成员信息、自动保存数据、定时备份、日期口令奖励，以及负分限制和群头衔联动，适合做群活跃体系或轻量积分经济。
version: 1.8.6
repo: https://github.com/menglimi/astrbot_plugin_point_system
